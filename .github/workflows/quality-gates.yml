name: Quality Gates

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install mypy

      - name: Lint runtime/plugin/benchmark modules
        run: |
          ruff check clawlet/runtime clawlet/plugins clawlet/benchmarks

      - name: Type-check runtime/plugin/benchmark modules
        run: |
          mypy --ignore-missing-imports clawlet/runtime clawlet/plugins clawlet/benchmarks

      - name: Run tests
        run: |
          pytest clawlet/tests -q

      - name: Determinism smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_determinism_smokecheck

          ok = run_determinism_smokecheck(Path('.'))
          if not ok:
              raise SystemExit(2)
          print('determinism smoke check passed')
          PY

      - name: Runtime event schema smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_event_schema_smokecheck

          ok, errors = run_event_schema_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('runtime event schema smoke check passed')
          PY

      - name: Remote worker schema sanity
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          req = Path("docs/schemas/remote-worker-execute-request.schema.json")
          resp = Path("docs/schemas/remote-worker-execute-response.schema.json")
          json.loads(req.read_text(encoding="utf-8"))
          json.loads(resp.read_text(encoding="utf-8"))
          print("remote worker schemas are valid JSON")
          PY

      - name: Remote parity smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_remote_parity_smokecheck

          ok, errors = run_remote_parity_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('remote parity smoke check passed')
          PY

      - name: Lane scheduling smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_lane_contention_smokecheck

          ok, errors = run_lane_contention_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('lane scheduling smoke check passed')
          PY

      - name: Context cache smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_context_cache_smokecheck

          ok, errors = run_context_cache_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('context cache smoke check passed')
          PY

      - name: Coding-loop smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_coding_loop_smokecheck

          ok, errors = run_coding_loop_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('coding-loop smoke check passed')
          PY

      - name: Failure taxonomy smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_failure_taxonomy_smokecheck

          ok, errors = run_failure_taxonomy_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('failure taxonomy smoke check passed')
          PY

      - name: Replay reexecution smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_replay_reexecution_smokecheck

          ok, errors = run_replay_reexecution_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('replay reexecution smoke check passed')
          PY

      - name: Replay retention smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_replay_retention_smokecheck

          ok, errors = run_replay_retention_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('replay retention smoke check passed')
          PY

      - name: OpenClaw-matched corpus smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_openclaw_matched_corpus_smokecheck

          ok, errors = run_openclaw_matched_corpus_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('openclaw-matched corpus smoke check passed')
          PY

      - name: Corpus compare smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_corpus_compare_smokecheck

          ok, errors = run_corpus_compare_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('corpus compare smoke check passed')
          PY

      - name: Release gate smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_release_gate_smokecheck

          ok, errors = run_release_gate_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('release gate smoke check passed')
          PY

      - name: Migration matrix smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.config_migration_matrix import run_migration_matrix_smokecheck

          ok, errors = run_migration_matrix_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('migration matrix smoke check passed')
          PY

      - name: Plugin matrix smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.plugins.matrix import run_plugin_matrix_smokecheck

          ok, errors = run_plugin_matrix_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('plugin matrix smoke check passed')
          PY

      - name: Release readiness smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.release_readiness import run_release_readiness_smokecheck

          ok, errors = run_release_readiness_smokecheck(Path('.'))
          if not ok:
              for item in errors:
                  print(item)
              raise SystemExit(2)
          print('release readiness smoke check passed')
          PY

  quality-strict-rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install maturin

      - name: Build Rust extension
        run: |
          maturin develop --manifest-path rust-core/Cargo.toml

      - name: Engine equivalence smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          from clawlet.benchmarks import run_engine_equivalence_smokecheck

          result = run_engine_equivalence_smokecheck(Path('.'))
          if not result.passed:
              for line in result.details:
                  print(line)
              raise SystemExit(2)
          print('engine equivalence smoke check passed')
          PY

      - name: Engine equivalence strict-rust gate
        run: |
          python -m clawlet benchmark equivalence --workspace . --strict-rust

      - name: Benchmark gate check
        run: |
          python -m clawlet benchmark run --workspace . --iterations 10 --fail-on-gate

      - name: Consolidated release-gate check
        run: |
          python -m clawlet benchmark release-gate --workspace . --local-iterations 5 --corpus-iterations 2 --fail-on-gate
